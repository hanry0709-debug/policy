<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>茂順企業 - 每月匿名意見與即時回饋看板</title>
    <style>
        :root {
            --primary: #1a365d;
            --primary-light: #2a4365;
            --accent: #319795;
            --danger: #e53e3e;
            --bg: #f7fafc;
            --card-shadow: 0 10px 20px rgba(0, 0, 0, 0.05), 0 6px 6px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            color: #2d3748;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            max-width: 850px;
            width: 100%;
        }

        /* 標頭設計 */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
            text-align: left;
            position: relative;
        }

        .header h1 { margin: 0; font-size: 26px; font-weight: 700; letter-spacing: 1px; }
        .header p { margin: 10px 0 0 0; color: #e2e8f0; font-size: 15px; opacity: 0.9; }

        /* 主管必辦看板 (Top 1) */
        .executive-panel {
            background: #fff;
            border-left: 6px solid var(--danger);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: var(--card-shadow);
            position: relative;
        }

        .panel-badge {
            display: inline-block;
            background-color: #fff5f5;
            color: var(--danger);
            font-weight: bold;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #fed7d7;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .top-content { font-size: 16px; font-weight: 600; color: #1a202c; line-height: 1.6; }
        .manager-note { font-size: 13px; color: #718096; margin-top: 10px; background: #f7fafc; padding: 10px; border-radius: 8px; border: 1px solid #edf2f7; }

        /* 提案輸入區 */
        .input-card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            margin-bottom: 30px;
        }

        .input-card h3 { margin-top: 0; margin-bottom: 15px; font-size: 18px; color: var(--primary); }
        
        .textarea-wrapper { position: relative; }
        
        textarea {
            width: 100%;
            height: 90px;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(49, 151, 149, 0.1); }

        .btn-submit {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 15px;
        }

        .btn-submit:hover { background: #287e7c; transform: translateY(-1px); }

        /* 意見流卡片區 */
        .board-title { font-size: 18px; font-weight: bold; color: var(--primary); margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .board-count { font-size: 13px; background: #e2e8f0; color: #4a5568; padding: 2px 10px; border-radius: 12px; }

        .suggestion-feed { display: grid; gap: 15px; }

        .feed-item {
            background: white;
            padding: 20px 25px;
            border-radius: 14px;
            box-shadow: var(--card-shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.4s ease;
            border-top: 1px solid #edf2f7;
        }

        .feed-text { font-size: 15px; line-height: 1.6; color: #4a5568; padding-right: 20px; }

        /* 讚數按鈕 */
        .like-button {
            background: #edf2f7;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 65px;
            transition: all 0.2s ease;
        }

        .like-button:hover { background: #e2e8f0; color: var(--accent); }
        .like-button.voted { background: #e6fffa; color: var(--accent); font-weight: bold; border: 1px solid #b2f5ea; }
        .like-icon { font-size: 18px; margin-bottom: 2px; }
        .like-count { font-size: 12px; }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <h1>📢 茂順企業 - 每月匿名意見與即時回饋看板</h1>
        <p>實踐透明溝通。在此匿名提出的任何建言，只要獲得同仁集氣最高讚，主管將列為本月承諾交辦必辦事項！</p>
    </div>

    <div class="executive-panel">
        <span class="panel-badge">🚨 本月最高票：主管承諾交辦事件</span>
        <div id="topSuggestion" class="top-content">目前看板尚無提案，等待大家集氣首發！</div>
    </div>

    <div class="input-card">
        <h3>💡 發表你的匿名心聲</h3>
        <div class="textarea-wrapper">
            <textarea id="sugInput" placeholder="請填寫您對公司製程、辦公環境、福利或管理上的具體意見（此系統為絕對匿名，請放心填寫）..."></textarea>
        </div>
        <button class="btn-submit" onclick="submitSuggestion()">匿名送出意見並開放集氣</button>
    </div>

    <div>
        <div class="board-title">
            <span>🔥 即時熱門提案流 (即時讚數排序)</span>
            <span id="boardCount" class="board-count">共 3 則提案</span>
        </div>
        <div id="suggestionFeed" class="suggestion-feed">
            </div>
    </div>
</div>

<script>
// 初始化虛擬資料
let suggestionData = [
    { id: 1, text: "廠區大樓一樓的機車停車棚遮雨棚有些微破損，下大雨時裡面的車子還是會濕掉，希望總務課能協助重新修補劃線。", likes: 32 },
    { id: 2, text: "強烈建議公司內部線上學院（E-learning）的課程能夠開放1.5倍速觀看功能，可以大幅提高大家吸收新知的效率！", likes: 18 },
    { id: 3, text: "希望福委會下半年的員工旅遊可以多規劃一些戶外露營或家庭日活動，讓有帶小孩的同仁更能融入團隊氛圍。", likes: 25 }
];

// 用來防止同一個人瘋狂重置連按讚（純前端暫存）
let votedIds = [];

function renderDashboard() {
    const feedEl = document.getElementById("suggestionFeed");
    feedEl.innerHTML = "";
    
    // 依讚數進行由高到低降序排序
    suggestionData.sort((a, b) => b.likes - a.likes);
    
    // 變更總數
    document.getElementById("boardCount").innerText = `共 ${suggestionData.length} 則提案`;
    
    // 更新最上方的「主管交辦面板」
    if (suggestionData.length > 0 && suggestionData[0].likes > 0) {
        document.getElementById("topSuggestion").innerHTML = `
            <span style="color:var(--danger); font-weight:800;">[👍 已獲 ${suggestionData[0].likes} 個同仁認同]</span> 
            "${suggestionData[0].text}"
            <div class="manager-note">📢 <strong>主管處室回覆：</strong>本案已達當月最高讚數，已自動派發至決策交辦清單，主管將於下月管理會議追蹤執行進度。</div>
        `;
    } else {
        document.getElementById("topSuggestion").innerText = "目前尚無提案或提案未獲得讚數，快召集同事一起來集氣！";
    }

    // 渲染下方流瀑布卡片
    suggestionData.forEach(item => {
        const itemCard = document.createElement("div");
        itemCard.className = "feed-item";
        
        const isVoted = votedIds.includes(item.id) ? "voted" : "";

        itemCard.innerHTML = `
            <div class="feed-text">${item.text}</div>
            <div>
                <button class="like-button ${isVoted}" onclick="likeSuggestion(${item.id})">
                    <span class="like-icon">👍</span>
                    <span class="like-count">認同 ${item.likes}</span>
                </button>
            </div>
        `;
        feedEl.appendChild(itemCard);
    });
}

// 點讚事件
function likeSuggestion(id) {
    // 簡易限制重複點讚邏輯
    if (votedIds.includes(id)) {
        alert("您已經對此匿名意見表示過認同囉！謝謝您的參與！");
        return;
    }
    
    const target = suggestionData.find(item => item.id === id);
    if (target) {
        target.likes += 1;
        votedIds.push(id);
        renderDashboard();
    }
}

// 發表意見事件
function submitSuggestion() {
    const inputEl = document.getElementById("sugInput");
    const text = inputEl.value.trim();
    
    if (!text) {
        alert("請先輸入您的心聲或建言內容再行送出唷！");
        return;
    }
    
    if (text.length < 5) {
        alert("為了讓權責主管能清楚理解，請至少輸入5個字以上的具體意見唷！");
        return;
    }

    const newId = suggestionData.length ? Math.max(...suggestionData.map(o => o.id)) + 1 : 1;
    
    // 新增進陣列，初始讚數為 0
    suggestionData.push({ id: newId, text: text, likes: 0 });
    inputEl.value = "";
    
    // 重新繪製網頁
    renderDashboard();
    alert("您的建言已安全地通過匿名加密通道送至看板！快請部門夥伴一起來閱讀點讚吧！");
}

// 初始化執行
renderDashboard();
</script>
</body>
</html>
